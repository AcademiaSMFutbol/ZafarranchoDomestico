<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zafarrancho Doméstico - Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; width: 95%; display: none; justify-content: space-between; z-index: 10; pointer-events: none; }
        .health-bar { width: 120px; height: 12px; background: #444; border: 2px solid #fff; border-radius: 4px; }
        .fill { width: 100%; height: 100%; transition: width 0.2s; }
        #p1-fill { background: #3498db; }
        #cpu-fill { background: #e74c3c; }
        #fs-btn { position: absolute; top: 10px; right: 10px; z-index: 20; background: rgba(255,255,255,0.2); border: none; font-size: 24px; border-radius: 5px; padding: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <button id="fs-btn">⛶</button>
    <div id="ui">
        <div><div class="health-bar"><div id="p1-fill" class="fill"></div></div></div>
        <div><div class="health-bar"><div id="cpu-fill" class="fill"></div></div></div>
    </div>
    <div id="game-container"></div>

    <script>
        class MainScene extends Phaser.Scene {
            constructor() { super('MainScene'); }

            preload() {
                this.load.image('fondo', 'image_1.png');
                this.load.spritesheet('dude', 'https://labs.phaser.io/assets/sprites/dude.png', { frameWidth: 32, frameHeight: 48 });
            }

            create() {
                const W = this.cameras.main.width;
                const H = this.cameras.main.height;
                
                this.add.image(W/2, H/2, 'fondo').setDisplaySize(W, H);
                this.generarTexturas();

                // Pantalla de Inicio
                this.overlay = this.add.rectangle(W/2, H/2, W, H, 0x000000, 0.7).setZ(100);
                this.startText = this.add.text(W/2, H/2, 'ZAFARRANCHO\nDOMÉSTICO\n\n[ TOCAR PARA EMPEZAR ]', { 
                    fontSize: '32px', fill: '#fff', align: 'center', fontStyle: 'bold' 
                }).setOrigin(0.5).setZ(101).setInteractive();

                this.startText.on('pointerdown', () => this.startGame());

                // Jugadores
                this.player = this.physics.add.sprite(W*0.2, H-100, 'dude').setScale(2.5).setTint(0x3498db);
                this.cpu = this.physics.add.sprite(W*0.8, H-100, 'dude').setScale(2.5).setTint(0xe74c3c);
                this.player.hp = 100; this.cpu.hp = 100;
                
                this.player.setCollideWorldBounds(true);
                this.cpu.setCollideWorldBounds(true);

                // Suelo invisible
                let ground = this.physics.add.staticGroup();
                ground.create(W/2, H-20, null).setDisplaySize(W, 40).setAlpha(0).refreshBody();
                this.physics.add.collider([this.player, this.cpu], ground);

                this.projectiles = this.physics.add.group();
                this.physics.add.overlap(this.projectiles, [this.player, this.cpu], this.onHit, null, this);

                this.isStarted = false;
                this.anims.create({ key: 'walk', frames: this.anims.generateFrameNumbers('dude', { start: 0, end: 3 }), frameRate: 10, repeat: -1 });
                this.anims.create({ key: 'idle', frames: [ { key: 'dude', frame: 4 } ], frameRate: 20 });
            }

            generarTexturas() {
                const draw = (key, w, h, col) => {
                    let g = this.make.graphics({x:0,y:0,add:false});
                    g.fillStyle(col, 1); g.fillRoundedRect(0,0,w,h,4);
                    g.generateTexture(key, w, h);
                };
                draw('cojin', 30, 25, 0x3498db);
                draw('mando', 25, 8, 0x2c3e50);
                draw('libro', 20, 28, 0x9b59b6);
                draw('jarron', 18, 30, 0xecf0f1);
            }

            startGame() {
                this.overlay.destroy();
                this.startText.destroy();
                document.getElementById('ui').style.display = 'flex';
                this.isStarted = true;
                this.setupControls();
                this.time.addEvent({ delay: 2000, callback: () => { if(this.isStarted) this.fire(this.cpu); }, loop: true });
            }

            setupControls() {
                const W = this.cameras.main.width; const H = this.cameras.main.height;
                this.input.addPointer(2);
                this.move = 0;

                let bL = this.add.rectangle(W*0.1, H*0.8, W*0.2, H*0.3, 0xffffff, 0.1).setInteractive();
                bL.on('pointerdown', () => this.move = -1);
                bL.on('pointerup', () => this.move = 0);

                let bR = this.add.rectangle(W*0.3, H*0.8, W*0.2, H*0.3, 0xffffff, 0.1).setInteractive();
                bR.on('pointerdown', () => this.move = 1);
                bR.on('pointerup', () => this.move = 0);

                let bD = this.add.rectangle(W*0.6, H*0.8, W*0.2, H*0.3, 0xffff00, 0.1).setInteractive();
                bD.on('pointerdown', () => this.player.isDefending = true);
                bD.on('pointerup', () => this.player.isDefending = false);

                let bF = this.add.rectangle(W*0.85, H*0.8, W*0.25, H*0.3, 0xff0000, 0.2).setInteractive();
                bF.on('pointerdown', () => this.fire(this.player));
            }

            update() {
                if(!this.isStarted) return;

                // Lógica Jugador
                if(this.player.isDefending) {
                    this.player.setVelocityX(0); this.player.setAlpha(0.5);
                } else {
                    this.player.setAlpha(1);
                    this.player.setVelocityX(this.move * 250);
                    if(this.move !== 0) {
                        this.player.setFlipX(this.move < 0);
                        this.player.anims.play('walk', true);
                    } else {
                        this.player.anims.play('idle');
                    }
                }

                // Lógica CPU (Mirar siempre al jugador)
                this.cpu.setFlipX(this.cpu.x > this.player.x);
            }

            fire(who) {
                if(who.isDefending || who.hp <= 0) return;
                const types = [
                    {k:'cojin', d:5, s:400}, {k:'mando', d:12, s:550}, 
                    {k:'libro', d:10, s:450}, {k:'jarron', d:20, s:350}
                ];
                let t = types[Math.floor(Math.random()*types.length)];
                let obj = this.projectiles.create(who.x, who.y, t.k);
                obj.damage = t.d;
                obj.owner = who;
                let dir = who.flipX ? -1 : 1;
                obj.setVelocity(t.s * dir, -150);
                obj.setAngularVelocity(300);
            }

            onHit(target, obj) {
                if(obj.owner === target) return;
                let finalDamage = target.isDefending ? Math.floor(obj.damage * 0.3) : obj.damage;
                target.hp -= finalDamage;
                obj.destroy();

                let bar = (target === this.player) ? 'p1-fill' : 'cpu-fill';
                document.getElementById(bar).style.width = target.hp + "%";

                if(target.hp <= 0) { alert("FIN DE LA BATALLA"); location.reload(); }
            }
        }

        const config = {
            type: Phaser.AUTO, width: window.innerWidth, height: window.innerHeight,
            parent: 'game-container', physics: { default: 'arcade', arcade: { gravity: { y: 600 } } },
            scene: MainScene
        };
        const game = new Phaser.Game(config);

        document.getElementById('fs-btn').onclick = () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        };
    </script>
</body>
</html>
