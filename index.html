<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zafarrancho Doméstico - MVP Final</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Arial', sans-serif; }
        #ui { position: absolute; top: 15px; width: 90%; display: none; justify-content: space-between; z-index: 10; pointer-events: none; }
        .health-bar { width: 140px; height: 16px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 8px; overflow: hidden; }
        .fill { width: 100%; height: 100%; transition: width 0.3s; }
        #p1-fill { background: #3498db; box-shadow: 0 0 10px #3498db; }
        #cpu-fill { background: #e74c3c; box-shadow: 0 0 10px #e74c3c; }
        canvas { border-radius: 10px; }
    </style>
</head>
<body>
    <div id="ui">
        <div><div class="health-bar"><div id="p1-fill" class="fill"></div></div></div>
        <div><div class="health-bar"><div id="cpu-fill" class="fill"></div></div></div>
    </div>
    <div id="game-container"></div>

    <script>
        class MainScene extends Phaser.Scene {
            constructor() { super('MainScene'); }

            preload() {
                this.load.image('fondo', 'image_1.png');
                this.load.spritesheet('dude', 'https://labs.phaser.io/assets/sprites/dude.png', { frameWidth: 32, frameHeight: 48 });
            }

            create() {
                const W = this.cameras.main.width;
                const H = this.cameras.main.height;
                
                this.add.image(W/2, H/2, 'fondo').setDisplaySize(W, H);
                this.generarTexturas();

                // Pantalla de Inicio mejorada
                this.setupMenu(W, H);

                // Jugadores
                this.player = this.physics.add.sprite(W*0.2, H-100, 'dude').setScale(2.8).setTint(0x3498db);
                this.cpu = this.physics.add.sprite(W*0.8, H-100, 'dude').setScale(2.8).setTint(0xe74c3c);
                this.player.hp = 100; this.cpu.hp = 100;
                this.player.setCollideWorldBounds(true);
                this.cpu.setCollideWorldBounds(true);

                let ground = this.physics.add.staticGroup();
                ground.create(W/2, H-20, null).setDisplaySize(W, 40).setAlpha(0).refreshBody();
                this.physics.add.collider([this.player, this.cpu], ground);

                this.projectiles = this.physics.add.group();
                this.physics.add.overlap(this.projectiles, [this.player, this.cpu], this.onHit, null, this);

                this.isStarted = false;
                this.anims.create({ key: 'walk', frames: this.anims.generateFrameNumbers('dude', { start: 0, end: 3 }), frameRate: 12, repeat: -1 });
                this.anims.create({ key: 'idle', frames: [ { key: 'dude', frame: 4 } ], frameRate: 20 });
            }

            setupMenu(W, H) {
                this.menuBg = this.add.rectangle(W/2, H/2, W, H, 0x000000, 0.8).setZ(100);
                
                // Botón de Inicio Estilizado
                this.btnStart = this.add.container(W/2, H/2);
                let btnShape = this.add.rectangle(0, 0, 300, 80, 0x3498db).setInteractive();
                let btnText = this.add.text(0, 0, '¡JUGAR!', { fontSize: '40px', fontStyle: 'bold', fill: '#fff' }).setOrigin(0.5);
                this.btnStart.add([btnShape, btnText]);
                this.btnStart.setZ(101);

                btnShape.on('pointerdown', () => {
                    this.tryFullScreen();
                    this.startGame();
                });
            }

            tryFullScreen() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(e => console.log("FS bloqueado"));
                }
            }

            startGame() {
                this.menuBg.destroy();
                this.btnStart.destroy();
                document.getElementById('ui').style.display = 'flex';
                this.isStarted = true;
                this.setupControls();
                this.time.addEvent({ delay: 2000, callback: () => { if(this.isStarted) this.fire(this.cpu); }, loop: true });
            }

            setupControls() {
                const W = this.cameras.main.width; const H = this.cameras.main.height;
                this.input.addPointer(2);
                this.moveDir = 0;

                // Controles Táctiles (Zonas invisibles pero efectivas)
                let bL = this.add.rectangle(W*0.15, H*0.8, W*0.3, H*0.4, 0xffffff, 0.05).setInteractive();
                this.add.text(W*0.12, H*0.78, '⬅️', {fontSize:'40px'});
                bL.on('pointerdown', () => this.moveDir = -1);
                bL.on('pointerup', () => this.moveDir = 0);

                let bR = this.add.rectangle(W*0.45, H*0.8, W*0.3, H*0.4, 0xffffff, 0.05).setInteractive();
                this.add.text(W*0.42, H*0.78, '➡️', {fontSize:'40px'});
                bR.on('pointerdown', () => this.moveDir = 1);
                bR.on('pointerup', () => this.moveDir = 0);

                let bD = this.add.rectangle(W*0.7, H*0.8, W*0.2, H*0.4, 0xffff00, 0.1).setInteractive();
                this.add.text(W*0.68, H*0.78, '🛡️', {fontSize:'30px'});
                bD.on('pointerdown', () => this.player.isDefending = true);
                bD.on('pointerup', () => this.player.isDefending = false);

                let bF = this.add.rectangle(W*0.9, H*0.8, W*0.2, H*0.4, 0xff0000, 0.2).setInteractive();
                this.add.text(W*0.88, H*0.78, '💥', {fontSize:'40px'});
                bF.on('pointerdown', () => this.fire(this.player));
            }

            generarTexturas() {
                const draw = (key, w, h, col) => {
                    let g = this.make.graphics({x:0,y:0,add:false});
                    g.fillStyle(col, 1); g.fillRoundedRect(0,0,w,h,6);
                    g.generateTexture(key, w, h);
                };
                draw('cojin', 34, 28, 0x3498db);
                draw('mando', 28, 10, 0x2c3e50);
                draw('libro', 22, 30, 0x9b59b6);
                draw('jarron', 20, 32, 0xecf0f1);
            }

            update() {
                if(!this.isStarted) return;

                // Lógica Jugador
                if(this.player.isDefending) {
                    this.player.setVelocityX(0);
                    this.player.setAlpha(0.5);
                    this.player.anims.play('idle');
                } else {
                    this.player.setAlpha(1);
                    this.player.setVelocityX(this.moveDir * 280);
                    
                    if(this.moveDir !== 0) {
                        // CORRECCIÓN ORIENTACIÓN:
                        // Si se mueve a la derecha (1), flipX es FALSE (mira a la derecha)
                        // Si se mueve a la izquierda (-1), flipX es TRUE (mira a la izquierda)
                        this.player.setFlipX(this.moveDir < 0);
                        this.player.anims.play('walk', true);
                    } else {
                        this.player.anims.play('idle');
                    }
                }

                // CPU mira siempre al jugador
                this.cpu.setFlipX(this.cpu.x > this.player.x);
            }

            fire(who) {
                if(who.hp <= 0 || who.isDefending) return;
                const types = [
                    {k:'cojin', d:5, s:450}, {k:'mando', d:12, s:600}, 
                    {k:'libro', d:10, s:500}, {k:'jarron', d:22, s:380}
                ];
                let t = types[Math.floor(Math.random()*types.length)];
                let obj = this.projectiles.create(who.x, who.y - 20, t.k);
                obj.damage = t.d;
                obj.owner = who;
                let dir = who.flipX ? -1 : 1;
                obj.setVelocity(t.s * dir, -180);
                obj.setAngularVelocity(400);
            }

            onHit(target, obj) {
                if(obj.owner === target) return;
                let dmg = target.isDefending ? Math.floor(obj.damage * 0.2) : obj.damage;
                target.hp -= dmg;
                obj.destroy();

                let bar = (target === this.player) ? 'p1-fill' : 'cpu-fill';
                document.getElementById(bar).style.width = target.hp + "%";

                if(target.hp <= 0) {
                    this.isStarted = false;
                    alert("¡BATALLA TERMINADA!");
                    location.reload();
                }
            }
        }

        const config = {
            type: Phaser.AUTO, width: window.innerWidth, height: window.innerHeight,
            parent: 'game-container', physics: { default: 'arcade', arcade: { gravity: { y: 700 } } },
            scene: MainScene
        };
        new Phaser.Game(config);
    </script>
</body>
</html>
